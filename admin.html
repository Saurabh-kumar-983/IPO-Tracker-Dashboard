<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPO Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">🔐</div>
    <div>
      <h2>IPO Admin Panel</h2>
      <p>Manage IPO records, live updates and news</p>
    </div>
  </div>
  <a href="index.html" class="download">Back to Dashboard</a>
</header>

<section class="filter-panel" id="loginBox">
  <input id="email" placeholder="Admin Email" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="loginAdmin()">Login</button>
</section>

<section class="filter-panel" id="adminBox" style="display:none;">
  <input id="company_name" placeholder="Company Name" />
  <input id="symbol" placeholder="Symbol" />
  <input id="ipo_type" placeholder="IPO Type: Mainboard/SME" />
  <input id="exchange" placeholder="Exchange" />
  <input id="price_band" placeholder="Price Band" />
  <input id="lot_size" placeholder="Lot Size" />
  <input id="issue_size" placeholder="Issue Size" />
  <input id="open_date" type="date" />
  <input id="close_date" type="date" />
  <input id="allotment_date" type="date" />
  <input id="refund_date" type="date" />
  <input id="listing_date" type="date" />

  <select id="status">
    <option value="Upcoming">Upcoming</option>
    <option value="Open">Open</option>
    <option value="Closed">Closed</option>
  </select>

  <input id="registrar" placeholder="Registrar" />
  <input id="rhp_url" placeholder="RHP URL" />
  <input id="registrar_url" placeholder="Registrar URL" />
  <input id="remarks" placeholder="Remarks" />

  <button onclick="saveIPO()">Save IPO</button>
  <button onclick="clearForm()">Clear</button>
  <button onclick="logoutAdmin()">Logout</button>
</section>

<section class="filter-panel" id="liveBox" style="display:none;">
  <select id="live_ipo_id">
    <option value="">Select IPO for Live Update</option>
  </select>

  <input id="gmp" placeholder="GMP e.g. ₹45" />
  <input id="retail_subscription" placeholder="Retail Subscription e.g. 2.45x" />
  <input id="qib_subscription" placeholder="QIB Subscription e.g. 5.20x" />
  <input id="nii_subscription" placeholder="NII Subscription e.g. 8.10x" />
  <input id="total_subscription" placeholder="Total Subscription e.g. 4.70x" />

  <button onclick="saveLiveUpdate()">Save Live Update</button>
</section>

<section class="filter-panel" id="newsBox" style="display:none;">
  <input id="news_title" placeholder="News Title" />

  <select id="news_category">
    <option value="IPO">IPO</option>
    <option value="GMP">GMP</option>
    <option value="Allotment">Allotment</option>
    <option value="Listing">Listing</option>
  </select>

  <input id="news_date" type="date" />
  <input id="news_source" placeholder="Source" />
  <input id="news_link" placeholder="News Link / Page Link" />
  <input id="news_summary" placeholder="News Summary" />

  <select id="news_active">
    <option value="true">Active</option>
    <option value="false">Inactive</option>
  </select>

  <button onclick="saveNews()">Save News</button>
  <button onclick="clearNewsForm()">Clear News</button>
</section>

<section class="table-card">
  <div class="table-head">
    <h2>IPO Records</h2>
    <p id="adminCount">0 records</p>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Symbol</th>
          <th>Status</th>
          <th>Open</th>
          <th>Close</th>
          <th>GMP</th>
          <th>Total Sub.</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTable">
        <tr><td colspan="8">Login to manage records</td></tr>
      </tbody>
    </table>
  </div>
</section>

<section class="table-card">
  <div class="table-head">
    <h2>News Records</h2>
    <p id="newsAdminCount">0 records</p>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Category</th>
          <th>Date</th>
          <th>Source</th>
          <th>Active</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="newsAdminTable">
        <tr><td colspan="6">Login to manage news</td></tr>
      </tbody>
    </table>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>
