<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPO Tracker India</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>IPO Tracker India</h1>

  <div class="tabs">

  <script src="app.js"></script>

</body>
</html>
